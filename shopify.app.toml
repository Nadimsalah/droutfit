# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "74303bbd83d05928ebbc1ebf980450a3"
name = "Ai Try on"
application_url = "https://droutfit.com"
embedded = true

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  uri = "/api/shopify/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/api/shopify/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/api/shopify/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products"

[auth]
redirect_urls = [
  "https://droutfit.com",
  "https://droutfit.com/dashboard",
  "https://droutfit.com/dashboard/shopify/connect"
]

[pos]
embedded = false
